<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contato — CPMcalc</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8467526488112649" crossorigin="anonymous"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0e0e10; --surface: #18181b; --surface2: #1f1f23;
      --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.14);
      --text: #f4f4f5; --muted: #a1a1aa; --accent: #a78bfa; --accent2: #7c3aed;
    }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 16px; line-height: 1.7; min-height: 100vh; }
    nav { display: flex; justify-content: space-between; align-items: center; padding: 1.2rem 2rem; border-bottom: 1px solid var(--border); background: rgba(14,14,16,0.92); backdrop-filter: blur(12px); }
    .logo { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 18px; color: var(--text); text-decoration: none; }
    .logo span { color: var(--accent); }
    .nav-links { display: flex; gap: 1.5rem; }
    .nav-links a { color: var(--muted); text-decoration: none; font-size: 14px; transition: color 0.2s; }
    .nav-links a:hover { color: var(--text); }
    .container { max-width: 560px; margin: 0 auto; padding: 3rem 1.5rem 4rem; }
    h1 { font-family: 'Syne', sans-serif; font-size: 2rem; font-weight: 700; margin-bottom: 0.5rem; }
    .sub { color: var(--muted); margin-bottom: 2.5rem; font-size: 15px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 2rem; }
    .field { margin-bottom: 1.2rem; }
    .field label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; font-weight: 500; }
    .field input, .field textarea, .field select {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 15px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border-color 0.2s;
      resize: vertical;
    }
    .field input:focus, .field textarea:focus, .field select:focus { border-color: var(--accent); }
    .field select option { background: var(--surface2); }
    .btn {
      width: 100%;
      background: var(--accent2);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 12px;
      font-size: 15px;
      font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: opacity 0.2s;
      margin-top: 0.5rem;
    }
    .btn:hover { opacity: 0.85; }
    .success { display: none; text-align: center; padding: 1.5rem; color: #34d399; font-weight: 500; }
    footer { text-align: center; padding: 2rem; color: #3f3f46; font-size: 13px; border-top: 1px solid var(--border); margin-top: 2rem; }
    footer a { color: #52525b; text-decoration: none; }
  </style>
</head>
<body>
<nav>
  <a href="index.html" class="logo">CPM<span>calc</span></a>
  <div class="nav-links">
    <a href="sobre.html">Sobre</a>
    <a href="privacidade.html">Privacidade</a>
    <a href="contato.html">Contato</a>
  </div>
</nav>
<div class="container">
  <h1>Contato</h1>
  <p class="sub">Sugestões, dúvidas ou parcerias — fale com a gente.</p>

  <div class="card">
    <div id="form-wrap">
      <div class="field">
        <label>Nome</label>
        <input type="text" id="nome" placeholder="Seu nome">
      </div>
      <div class="field">
        <label>E-mail</label>
        <input type="email" id="email" placeholder="seu@email.com">
      </div>
      <div class="field">
        <label>Assunto</label>
        <select id="assunto">
          <option value="">Selecione...</option>
          <option>Sugestão de melhoria</option>
          <option>Erro na calculadora</option>
          <option>Parceria / Publicidade</option>
          <option>Dúvida geral</option>
          <option>Privacidade / LGPD</option>
        </select>
      </div>
      <div class="field">
        <label>Mensagem</label>
        <textarea id="msg" rows="4" placeholder="Descreva sua mensagem..."></textarea>
      </div>
      <button class="btn" onclick="enviar()">Enviar mensagem</button>
    </div>
    <div class="success" id="success">
      ✓ Mensagem enviada! Responderemos em breve.
    </div>
  </div>
</div>
<footer>
  <p>© 2026 CPMcalc · <a href="sobre.html">Sobre</a> · <a href="privacidade.html">Política de Privacidade</a> · <a href="contato.html">Contato</a></p>
</footer>
<script>
function enviar() {
  const nome = document.getElementById('nome').value.trim();
  const email = document.getElementById('email').value.trim();
  const msg = document.getElementById('msg').value.trim();
  if (!nome || !email || !msg) { alert('Por favor, preencha todos os campos obrigatórios.'); return; }
  document.getElementById('form-wrap').style.display = 'none';
  document.getElementById('success').style.display = 'block';
}
</script>
</body>
</html>
